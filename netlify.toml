[build]
command = "pnpm --filter @workspace/mobile... run build"
publish = "artifacts/mobile"
base = "."

[build.environment]
EXPO_PUBLIC_DOMAIN = "lntparis.netlify.app"
EXPO_PUBLIC_API_URL = "https://lnt-paris-production.up.railway.app"

# Redirect all non-existent files to index.html for SPA routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
