<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNT Paris - Gestion de Stand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .status {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #C9AD71;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status-text {
      color: #666;
      font-size: 14px;
    }
    .button {
      display: inline-block;
      padding: 12px 30px;
      background: #C9AD71;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    .button:hover {
      background: #b39a5d;
    }
    .error {
      color: #d32f2f;
      background: #ffebee;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📱</div>
    <h1>LNT Paris</h1>
    <p class="subtitle">Gestion de Stand</p>
    
    <div class="error" id="error"></div>
    
    <div class="status">
      <span class="spinner" id="spinner"></span>
      <span class="status-text" id="status">Chargement...</span>
    </div>
    
    <button class="button" id="fallback" style="display: none;">
      Ouvrir manuellement
    </button>
  </div>

  <script>
    const device = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    async function loadApp() {
      try {
        document.getElementById('status').textContent = 'Préparation de l\'app...';
        
        // Try to fetch the manifest files to verify the build exists
        const platform = isIOS ? 'ios' : 'android';
        const manifestUrl = `./static-build/${platform}/manifest.json`;
        
        document.getElementById('status').textContent = `Vérification du build ${platform}...`;
        const manifestResponse = await fetch(manifestUrl);
        
        if (!manifestResponse.ok) {
          throw new Error(`Build ${platform} non trouvé (${manifestResponse.status})`);
        }
        
        const manifest = await manifestResponse.json();
        document.getElementById('status').textContent = '✓ App prête!';
        
        // For mobile devices, open with Expo Go
        if (device) {
          setTimeout(() => {
            // Use expo protocol to launch the app
            const expoUrl = `expo+https://lntparis.netlify.app/static-build/${platform}/manifest.json`;
            window.location.href = expoUrl;
          }, 800);
        } else {
          // For web/desktop, show the direct link
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').textContent = 'App chargée!';
          document.getElementById('fallback').style.display = 'inline-block';
          document.getElementById('fallback').textContent = 'Ouvrir l\'app →';
          document.getElementById('fallback').href = `./static-build/${platform}/manifest.json`;
        }
        
      } catch (error) {
        console.error(error);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = '✗ Erreur';
        
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `<strong>Erreur:</strong> ${error.message}<br><small>Vérifiez que l'app a été correctement déployée</small>`;
        errorDiv.classList.add('show');
        
        document.getElementById('fallback').style.display = 'inline-block';
        document.getElementById('fallback').textContent = 'Réessayer';
        document.getElementById('fallback').onclick = () => location.reload();
      }
    }
    
    // Start loading
    loadApp();
  </script>
</body>
</html>
